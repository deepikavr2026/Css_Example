<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .container{
            display: flex;
            width: 800px;
            height: 200px;
            border: 2px solid yellowgreen;
            margin: 50px auto;
        }

        .box{
            height: 100px;
            border: 2px solid olive;
            color: aquamarine;
            font-size: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box1{
            background: blueviolet;
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 200px;
        }
        .box2{
            background: red;
            flex-grow: 2;
            flex-shrink: 2;
            flex-basis: 300px;
        }
        .box3{
            background: brown;
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
            <div class="box box1">box1</div>
            <div class="box box2">box2</div>
            <div class="box box3">box3</div>
    </div>
</body>
</html>
