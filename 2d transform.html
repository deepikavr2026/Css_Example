<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <head>
        <style>
            .box{
                width: 150px;
                height: 150px;
                background: rebeccapurple;
                margin: 100px;
                transition: 1s;
            }

            .box:hover{
                transform:
                translate(100px,50px)
                rotate(45deg)
                scale(2)
                skew(10deg,5deg)
            }
        </style>
        
    </head>
</head>
<body>

    <div class="box"></div>

</body>
</html>
