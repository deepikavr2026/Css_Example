<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        .serif{
            font-family: serif;
        }

        .sans-serif{
            font-family: sans-serif;
        }

        .monospace{
            font-family: monospace;
        }

        .cursive{
            font-family: cursive;
        }

        .fantasy{
            font-family: fantasy;
        }

        #para1{
            font-family: sans-serif;
            font-family: oblique;
            font-family: bold;
            font-family: 40px;
        }
    </style>
</head>
<body>
    <p id="para1">WELCOME to CSS font class</p>
    <p id="para2">CSS font property</p>
    <p class="serif">This is my serif font</p>
    <p class="sans-serif">This is my sans-serif</p>
    <p class="monospace">This is my monospace</p>
    <p class="cursive">This is my cursive</p>
    <p class="fantasy">This is my fantasy</p>
</body>
</html>
