<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .box{
            width: 150px;
            height: 150px;
            background: red;

            transition-property: all;
            transition-duration: 2s;
            transition-timing-function: ease-in-out;
            transition-delay: 1s;
        }

        .box:hover{
            background: blue;
            width: 300px;
            border-radius: 50%;
        }
    </style>
</body>

<div class="box"></div>
</html>
